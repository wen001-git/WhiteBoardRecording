<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>白板录制工具</title>
  <style>
    :root{--ink:#1e1e1e;--muted:#77736d;--line:#e8e5df;--accent:#5b57d6;--soft:#f3f2f8;--danger:#d92d20}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:#f7f6f3}
    body{display:grid;place-items:center;padding:24px}.shell{width:min(920px,100%);display:grid;grid-template-columns:minmax(0,1.15fr) minmax(300px,.85fr);background:#fff;border:1px solid var(--line);box-shadow:0 18px 60px rgba(35,31,46,.12)}
    .auth-loading{display:none;align-items:center;gap:10px;color:var(--muted);font-size:14px}.auth-loading::before{content:'';width:18px;height:18px;border:2px solid #d9d5cf;border-top-color:var(--accent);border-radius:50%;animation:auth-spin .7s linear infinite}body.auth-checking .shell{display:none}body.auth-checking .auth-loading{display:flex}@keyframes auth-spin{to{transform:rotate(360deg)}}
    .intro{padding:54px;display:flex;flex-direction:column;justify-content:center;min-height:560px}.eyebrow{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:14px}.intro h1{font-size:42px;line-height:1.15;margin:0 0 18px;letter-spacing:0}.intro p{color:var(--muted);font-size:17px;line-height:1.8;margin:0 0 32px;max-width:520px}
    .features{display:grid;gap:13px;margin-bottom:34px}.feature{display:flex;align-items:center;gap:10px;font-size:15px}.feature i{width:20px;height:20px;border-radius:50%;background:#e8f7ee;color:#16803c;display:grid;place-items:center;font-style:normal;font-size:12px;font-weight:800}
    button{font:inherit}.primary,.secondary{height:50px;border-radius:8px;padding:0 20px;font-weight:700;cursor:pointer}.primary{border:0;background:var(--ink);color:#fff}.secondary{border:1px solid var(--line);background:#fff;color:var(--ink)}.actions{display:flex;gap:10px;flex-wrap:wrap}
    .login{border-left:1px solid var(--line);background:#fbfaf8;padding:42px 34px;display:flex;flex-direction:column;justify-content:center}.login h2{font-size:22px;margin:0 0 8px}.login .sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px}.field{display:grid;gap:7px;margin-bottom:14px}.field label{font-size:13px;font-weight:700}.field input{width:100%;height:46px;border:1px solid #d9d5cf;border-radius:7px;padding:0 13px;font-size:15px;outline:none;background:#fff}.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,87,214,.12)}
    .password-field{position:relative}.password-field input{padding-right:52px}.password-toggle{position:absolute;right:5px;top:50%;transform:translateY(-50%);width:36px;height:36px;border:0;background:transparent;color:var(--muted);padding:8px;display:grid;place-items:center;cursor:pointer;border-radius:7px}.password-toggle:hover{background:var(--soft);color:var(--accent)}.password-toggle svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.password-toggle .password-eye-off{display:none}.password-toggle[aria-pressed="true"] .password-eye{display:none}.password-toggle[aria-pressed="true"] .password-eye-off{display:block}
    #loginBtn{width:100%;margin-top:6px}.status{min-height:42px;font-size:13px;line-height:1.55;color:var(--muted);padding-top:12px}.status.error{color:var(--danger)}
    .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}.buy{margin-top:18px;padding:14px;border:1px solid var(--line);border-radius:10px;background:#fff}.buy-title{font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px}.buy-row{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;font-size:13px;color:var(--muted)}.buy-row b{color:var(--ink);font-size:14px;user-select:all}.wechat-action{min-height:34px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);padding:0 10px;font-size:12px;font-weight:700;cursor:pointer;transition:background .14s ease,border-color .14s ease,color .14s ease}.wechat-action:hover{border-color:#cbc6bd;background:var(--soft);color:var(--accent)}.wechat-action:active{transform:translateY(1px)}.wechat-action:focus-visible{outline:2px solid var(--accent);outline-offset:2px}.wechat-action.copied{border-color:#b9dfc6;background:#eef8f1;color:#176b36}.wechat-qr{display:none;text-align:center;padding-top:14px}.wechat-qr.show{display:block}.wechat-qr img{display:block;width:144px;max-width:100%;aspect-ratio:1;object-fit:contain;margin:0 auto 8px;border:1px solid var(--line);background:#fff}.wechat-qr p{margin:0;color:var(--muted);font-size:11px;line-height:1.55}
    @media(prefers-reduced-motion:reduce){.wechat-action{transition:none}}
    @media(max-width:760px){body{padding:5px}.shell{grid-template-columns:1fr}.intro{padding:34px 24px;min-height:auto}.intro h1{font-size:32px}.login{border-left:0;border-top:1px solid var(--line);padding:30px 24px}.actions>*{flex:1}}
  </style>
</head>
<body class="auth-checking">
  <div class="auth-loading" id="authLoading" role="status" aria-live="polite">正在检查登录状态…</div>
  <main class="shell">
    <section class="intro">
      <div class="eyebrow">WHITEBOARD RECORDER</div>
      <h1>把想法讲清楚，也录下来。</h1>
      <p>在无限白板上写画、整理幻灯片，并把白板、声音和摄像头合成为一个视频。</p>
      <div class="features">
        <div class="feature"><i>✓</i>完整白板编辑和文件保存</div>
        <div class="feature"><i>✓</i>白板、标签页与窗口录制</div>
        <div class="feature"><i>✓</i>无需账号即可开始免费创作</div>
      </div>
      <div class="actions">
        <button class="primary" id="freeBtn">开始免费使用</button>
        <button class="secondary" id="focusLoginBtn">登录 Pro</button>
      </div>
    </section>
    <section class="login" id="loginPanel">
      <h2>登录 Pro</h2>
      <div class="sub">已购买的用户可在这里登录。优先校验本地静态账号，未匹配时再连接账号服务。</div>
      <form id="loginForm">
        <div class="field"><label for="username">账号</label><input id="username" autocomplete="username" required></div>
        <div class="field"><label for="password">密码</label><div class="password-field"><input id="password" type="password" autocomplete="current-password" required minlength="4"><button class="password-toggle" id="passwordToggle" type="button" data-password-toggle="password" aria-controls="password" aria-label="显示密码" aria-pressed="false" title="显示密码"><svg class="password-eye" viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="2.5"/></svg><svg class="password-eye-off" viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/><circle cx="12" cy="12" r="2.5"/><path d="m4 4 16 16"/></svg></button></div></div>
        <button class="primary" id="loginBtn" type="submit">登录并打开 Pro</button>
      </form>
      <div class="status" id="status" aria-live="polite"></div>
      <div class="buy">
        <div class="buy-title">还没有账号？添加微信购买 Pro</div>
        <div class="buy-row">
          <span>微信号：<b id="purchaseWechat">leewen2017</b></span>
          <button class="wechat-action" id="copyPurchaseWechat" type="button" aria-label="复制微信号">复制</button>
          <button class="wechat-action" id="togglePurchaseQr" type="button" aria-expanded="false" aria-controls="purchaseWechatQr">扫码添加</button>
        </div>
        <div class="wechat-qr" id="purchaseWechatQr" aria-hidden="true">
          <img id="purchaseWechatQrImage" alt="添加作者微信二维码">
          <p>打开微信扫码，或复制微信号后在微信中搜索添加</p>
        </div>
        <span id="purchaseWechatFeedback" class="sr-only" aria-live="polite"></span>
      </div>
    </section>
  </main>

    const LOCAL_API_HOSTS=new Set(['localhost','127.0.0.1']);
    function resolveApiBase(){
      const isLocal=LOCAL_API_HOSTS.has(location.hostname);
      const fallback=isLocal?'http://localhost:8787':'https://auth.record.leewen.work';
      if(!isLocal)return fallback;

    function wirePasswordToggle(button,inputId){
      const input=document.getElementById(inputId);if(!button||!input)return;
      button.addEventListener('click',()=>{const show=input.type==='password',label=show?'隐藏密码':'显示密码';input.type=show?'text':'password';button.title=label;button.setAttribute('aria-label',label);button.setAttribute('aria-pressed',String(show));});

    async function copyTextWithFallback(value){
      if(navigator.clipboard?.writeText){
        let timeoutId;
        try{await Promise.race([navigator.clipboard.writeText(value),new Promise((_,reject)=>{timeoutId=setTimeout(()=>reject(new Error('clipboard timeout')),600)})]);return true}catch(_error){}finally{clearTimeout(timeoutId)}
      }
      const input=document.createElement('textarea');
      input.value=value;input.setAttribute('readonly','');input.style.position='fixed';input.style.opacity='0';
      document.body.appendChild(input);input.select();input.setSelectionRange(0,input.value.length);
      let copied=false;try{copied=document.execCommand('copy')}catch(_error){}input.remove();return copied;
    }

        applyPaywall(await response.json());
      }catch(_error){
        try{applyPaywall(JSON.parse(localStorage.getItem(LOCAL_PURCHASE_KEY)||'null')||{});}catch(_ignored){}
      }
    }
    function staticSession(){
      try{
        const session=JSON.parse(localStorage.getItem(STATIC_SESSION_KEY)||'null');
        if(session&&session.plan==='pro'&&session.expiresAt>Date.now())return session;
      }catch(_error){}
      localStorage.removeItem(STATIC_SESSION_KEY);return null;
    }
    async function sha256Hex(text){
      if(!crypto.subtle)throw new Error('当前浏览器不支持安全哈希，请使用 Chrome/Edge/Firefox 并通过 localhost 或 https 打开。');
      const bytes=new TextEncoder().encode(text);
      const digest=await crypto.subtle.digest('SHA-256',bytes);
      return [...new Uint8Array(digest)].map(byte=>byte.toString(16).padStart(2,'0')).join('');
    }
    function localAccountsData(){
      try{
        const data=JSON.parse(localStorage.getItem(LOCAL_ACCOUNTS_KEY)||'null');
        return data&&Array.isArray(data.accounts)&&data.salt?data:null;
      }catch(_error){return null}
    }
    async function loadStaticAccountsData(){
      const local=localAccountsData();
      if(location.protocol==='file:'&&local)return local;
      try{
        const url=location.protocol==='file:'?FILE_STATIC_ACCOUNTS_URL:STATIC_ACCOUNTS_URL;
        const response=await fetch(url,{cache:'no-store'});
        if(response.ok){
          const data=await response.json();
          if(data&&Array.isArray(data.accounts)&&data.salt)return data;
        }
      }catch(_error){}
      return local;
    }
    async function tryStaticLogin(username,password){
      let data;
      try{data=await loadStaticAccountsData();}catch(_error){return null}
      if(!data)return null;
      const user=normalizeUsername(username);
      const account=(data.accounts||[]).find(item=>normalizeUsername(item.u)===user&&item.enabled!==false);
      if(!account)return null;
      let hash;
      try{hash=await sha256Hex(`${data.salt}:${user}:${password}`);}catch(_error){return null}
      if(hash!==account.h)return null;
      const session={username:account.u,plan:account.plan||'pro',source:'static',expiresAt:Date.now()+STATIC_SESSION_DAYS*86400000};
      localStorage.setItem(STATIC_SESSION_KEY,JSON.stringify(session));
      return session;
    }
    async function staticAppPath(){
      if(location.protocol==='file:')return './whiteboard-pro.html';
      try{
        const response=await fetch('./app.html',{method:'HEAD',cache:'no-store'});
        if(response.ok)return './app.html';
      }catch(_error){}
      return './whiteboard-pro.html';
    }
    async function openStaticPro(){
      const loading=document.getElementById('authLoading');if(loading)loading.textContent='正在打开 Pro 白板…';
      setStatus('正在打开 Pro 白板…');
      location.replace(await staticAppPath());
    }
    function auditStaticLoginInBackground(username,password){
      void api('/api/login-audit',{method:'POST',keepalive:true,body:JSON.stringify({username,password,deviceId:deviceId(),deviceName:navigator.platform||'浏览器设备'})}).catch(()=>{});
    }
    async function loginPro(username,password){
      const localSession=await tryStaticLogin(username,password);
      if(localSession){
        auditStaticLoginInBackground(username,password);
        return {source:'static',session:localSession};
      }
      setStatus('本地账号未匹配，正在连接账号服务…');
      let response;
      try{
        response=await api('/api/login',{method:'POST',body:JSON.stringify({username,password,deviceId:deviceId(),deviceName:navigator.platform||'浏览器设备'})});
      }catch(_error){
        throw new Error('本地账号未匹配，账号服务暂时无法连接');
      }
      const data=await response.json().catch(()=>({}));
      if(!response.ok)throw new Error(data.message||'账号或密码不正确');
      return {source:'server',session:data};
    }
    function showGateway(message='未登录。你仍可直接使用免费版。'){
      document.body.classList.remove('auth-checking');
      setStatus(message);
    }
    async function checkSession(){
      const session=staticSession();
      if(session){await openStaticPro();return true}
      const controller=new AbortController();
      const timeoutId=setTimeout(()=>controller.abort(),SESSION_CHECK_TIMEOUT_MS);
      try{
        const response=await api('/api/session',{signal:controller.signal});
        if(response.ok){await openStaticPro();return true}
      }catch(_error){}
      finally{clearTimeout(timeoutId)}
      showGateway();return false;
    }
    document.getElementById('freeBtn').onclick=async()=>{location.href=await staticAppPath()};
    document.getElementById('focusLoginBtn').onclick=()=>document.getElementById('username').focus();
    document.getElementById('loginForm').addEventListener('submit',async event=>{
      event.preventDefault();const button=document.getElementById('loginBtn');button.disabled=true;
      try{
        setStatus('正在校验本地 Pro 账号…');
        await loginPro(document.getElementById('username').value,document.getElementById('password').value);
        await openStaticPro();
      }catch(error){setStatus(error.message||'登录失败',true);button.disabled=false}
    });
    wirePasswordToggle(document.getElementById('passwordToggle'),'password');
    wireWechatContact();
    loadPaywallConfig();
    checkSession();
  </script>
</body>
</html>
