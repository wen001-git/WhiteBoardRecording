<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>白板录制工具</title>
  <style>
    :root{--ink:#1e1e1e;--muted:#77736d;--line:#e8e5df;--accent:#5b57d6;--soft:#f3f2f8;--danger:#d92d20}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--ink);background:#f7f6f3}
    body{display:grid;place-items:center;padding:24px}.shell{width:min(920px,100%);display:grid;grid-template-columns:minmax(0,1.15fr) minmax(300px,.85fr);background:#fff;border:1px solid var(--line);box-shadow:0 18px 60px rgba(35,31,46,.12)}
    .intro{padding:54px;display:flex;flex-direction:column;justify-content:center;min-height:560px}.eyebrow{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:14px}.intro h1{font-size:42px;line-height:1.15;margin:0 0 18px;letter-spacing:0}.intro p{color:var(--muted);font-size:17px;line-height:1.8;margin:0 0 32px;max-width:520px}
    .features{display:grid;gap:13px;margin-bottom:34px}.feature{display:flex;align-items:center;gap:10px;font-size:15px}.feature i{width:20px;height:20px;border-radius:50%;background:#e8f7ee;color:#16803c;display:grid;place-items:center;font-style:normal;font-size:12px;font-weight:800}
    button{font:inherit}.primary,.secondary{height:50px;border-radius:8px;padding:0 20px;font-weight:700;cursor:pointer}.primary{border:0;background:var(--ink);color:#fff}.secondary{border:1px solid var(--line);background:#fff;color:var(--ink)}.actions{display:flex;gap:10px;flex-wrap:wrap}
    .login{border-left:1px solid var(--line);background:#fbfaf8;padding:42px 34px;display:flex;flex-direction:column;justify-content:center}.login h2{font-size:22px;margin:0 0 8px}.login .sub{font-size:14px;color:var(--muted);line-height:1.6;margin-bottom:24px}.field{display:grid;gap:7px;margin-bottom:14px}.field label{font-size:13px;font-weight:700}.field input{height:46px;border:1px solid #d9d5cf;border-radius:7px;padding:0 13px;font-size:15px;outline:none;background:#fff}.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,87,214,.12)}
    #loginBtn{width:100%;margin-top:6px}.status{min-height:42px;font-size:13px;line-height:1.55;color:var(--muted);padding-top:12px}.status.error{color:var(--danger)}.session{display:none;padding:13px;background:#eef8f1;color:#176b36;font-size:13px;margin-bottom:14px}.session.show{display:block}
    .buy{font-size:12px;color:var(--muted);text-align:center;margin-top:18px}.buy b{color:var(--ink)}
    @media(max-width:760px){body{padding:5px}.shell{grid-template-columns:1fr}.intro{padding:34px 24px;min-height:auto}.intro h1{font-size:32px}.login{border-left:0;border-top:1px solid var(--line);padding:30px 24px}.actions>*{flex:1}}
  </style>
</head>
<body>
  <main class="shell">
    <section class="intro">
      <div class="eyebrow">WHITEBOARD RECORDER</div>
      <h1>把想法讲清楚，也录下来。</h1>
      <p>在无限白板上写画、整理幻灯片，并把白板、声音和摄像头合成为一个视频。</p>
      <div class="features">
        <div class="feature"><i>✓</i>完整白板编辑和文件保存</div>
        <div class="feature"><i>✓</i>白板、标签页与窗口录制</div>
        <div class="feature"><i>✓</i>无需账号即可开始免费创作</div>
      </div>
      <div class="actions">
        <button class="primary" id="freeBtn">开始免费使用</button>
        <button class="secondary" id="focusLoginBtn">登录 Pro</button>
      </div>
    </section>
    <section class="login" id="loginPanel">
      <h2>登录 Pro</h2>
      <div class="sub">已购买的用户可在这里登录。账号服务休眠时，首次启动可能需要约 30–60 秒。</div>
      <div class="session" id="sessionBox"></div>
      <form id="loginForm">
        <div class="field"><label for="username">账号</label><input id="username" autocomplete="username" required></div>
        <div class="field"><label for="password">密码</label><input id="password" type="password" autocomplete="current-password" required minlength="8"></div>
        <button class="primary" id="loginBtn" type="submit">登录并打开 Pro</button>
      </form>
      <div class="status" id="status" aria-live="polite"></div>
      <div class="buy">还没有账号？微信联系 <b>leewen2017</b></div>
    </section>
  </main>
  <script>
    const LOCAL_API_HOSTS=new Set(['localhost','127.0.0.1']);
    function resolveApiBase(){
      const isLocal=LOCAL_API_HOSTS.has(location.hostname);
      const fallback=isLocal?'http://localhost:8787':'https://auth.record.leewen.work';
      if(!isLocal)return fallback;
      try{
        const override=new URLSearchParams(location.search).get('api');
        if(!override)return fallback;
        const target=new URL(override);
        if((target.protocol==='http:'||target.protocol==='https:')&&LOCAL_API_HOSTS.has(target.hostname))return target.origin;
      }catch(_error){}
      return fallback;
    }
    const API_BASE=resolveApiBase();
    const DEVICE_KEY='wb_pro_device_id';
    function deviceId(){let id=localStorage.getItem(DEVICE_KEY);if(!id){id='wb-'+crypto.randomUUID().replaceAll('-','');localStorage.setItem(DEVICE_KEY,id)}return id}
    function setStatus(message,error=false){const el=document.getElementById('status');el.textContent=message;el.classList.toggle('error',error)}
    async function api(path,options={}){return fetch(API_BASE+path,{credentials:'include',...options,headers:{'content-type':'application/json',...(options.headers||{})}})}
    async function openPro(){
      setStatus('正在加载 Pro 白板…');
      const response=await api('/api/app');
      if(!response.ok)throw new Error(response.status===401?'登录已失效，请重新登录':'未能加载 Pro 白板');
      const html=await response.text();
      document.open();document.write(html);document.close();
    }
    async function checkSession(){
      setStatus('正在启动账号服务，首次可能需要约 30–60 秒…');
      try{
        const response=await api('/api/session');
        if(!response.ok){setStatus('未登录。你仍可直接使用免费版。');return}
        const data=await response.json();
        const box=document.getElementById('sessionBox');box.textContent=`已登录：${data.username}`;box.classList.add('show');
        document.getElementById('loginBtn').textContent='打开 Pro';setStatus('账号验证成功。');
      }catch(error){setStatus('账号服务正在启动或暂时不可用，可先使用免费版。',true)}
    }
    document.getElementById('freeBtn').onclick=()=>location.href='./app.html';
    document.getElementById('focusLoginBtn').onclick=()=>document.getElementById('username').focus();
    document.getElementById('loginForm').addEventListener('submit',async event=>{
      event.preventDefault();const button=document.getElementById('loginBtn');button.disabled=true;
      try{
        setStatus('正在启动账号服务并验证账号，首次可能需要约 30–60 秒…');
        const response=await api('/api/login',{method:'POST',body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value,deviceId:deviceId(),deviceName:navigator.platform||'浏览器设备'})});
        const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.message||'登录失败');await openPro();
      }catch(error){setStatus(error.message||'登录失败',true);button.disabled=false}
    });
    checkSession();
  </script>
</body>
</html>
