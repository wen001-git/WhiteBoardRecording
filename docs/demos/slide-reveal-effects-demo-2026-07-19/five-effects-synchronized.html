<div id="five-effects-lab">
  <div class="viz-controls five-playback-controls">
    <button type="button" class="btn btn-primary" id="five-effects-play"><i data-lucide="pause" aria-hidden="true"></i><span>暂停</span></button>
    <button type="button" class="btn" id="five-effects-replay"><i data-lucide="rotate-ccw" aria-hidden="true"></i><span>同步重播</span></button>
    <label class="form-label five-progress-label" for="five-effects-progress">同步进度 <span id="five-effects-progress-value">0%</span>
      <input class="form-range" id="five-effects-progress" type="range" min="0" max="1000" value="0" step="1">
    </label>
    <label class="form-label" for="five-effects-speed">速度
      <select class="form-select" id="five-effects-speed">
        <option value="0.75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
      </select>
    </label>
  </div>

  <div class="viz-grid five-effects-grid">
    <figure>
      <figcaption><span class="viz-badge">1</span><span>彩铅铺色</span></figcaption>
      <canvas class="card" data-effect="pencil" width="300" height="361" role="img" aria-label="彩铅铺色效果"></canvas>
    </figure>
    <figure>
      <figcaption><span class="viz-badge">2</span><span>水墨晕染</span></figcaption>
      <canvas class="card" data-effect="ink" width="300" height="361" role="img" aria-label="水墨晕染效果"></canvas>
    </figure>
    <figure>
      <figcaption><span class="viz-badge">3</span><span>逐笔描绘</span></figcaption>
      <canvas class="card" data-effect="stroke" width="300" height="361" role="img" aria-label="逐笔描绘位图近似效果"></canvas>
    </figure>
    <figure>
      <figcaption><span class="viz-badge">4</span><span>左 → 右铅笔绘制</span></figcaption>
      <canvas class="card" data-effect="left" width="300" height="361" role="img" aria-label="从左到右逐渐绘制的铅笔效果"></canvas>
    </figure>
    <figure>
      <figcaption><span class="viz-badge">5</span><span>左上 → 右下铅笔绘制</span></figcaption>
      <canvas class="card" data-effect="diagonal" width="300" height="361" role="img" aria-label="从左上到右下逐渐绘制的铅笔效果"></canvas>
    </figure>
  </div>
  <p class="text-small text-muted five-effects-note">五种效果使用同一张图、同一进度与固定随机种子，可拖动进度逐帧比较。</p>
</div>

<style>
  #five-effects-lab{
    width:100%;
    display:grid;
    gap:16px;
  }
  #five-effects-lab .five-playback-controls{
    justify-content:center;
  }
  #five-effects-lab .five-progress-label{
    flex:1 1 280px;
    max-width:430px;
  }
  #five-effects-lab .five-progress-label .form-range{
    width:100%;
  }
  #five-effects-lab figure{
    margin:0;
    display:grid;
    gap:8px;
    justify-items:center;
    align-content:start;
    min-width:0;
  }
  #five-effects-lab figcaption{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-align:center;
  }
  #five-effects-lab canvas{
    display:block;
    width:100%;
    height:auto;
  }
  #five-effects-lab .five-effects-note{
    margin:0;
    text-align:center;
  }
  @media (max-width:480px){
    #five-effects-lab{gap:12px;}
    #five-effects-lab .five-playback-controls{align-items:flex-end;}
    #five-effects-lab .five-progress-label{order:3;flex-basis:100%;max-width:none;}
  }
</style>

  const makeCanvas=(w=W,h=H)=>{const c=document.createElement('canvas');c.width=w;c.height=h;return c;};
  const targetCanvas=makeCanvas();

  function clamp(v,min=0,max=1){return Math.max(min,Math.min(max,v));}
  function smoothstep(a,b,v){const t=clamp((v-a)/(b-a));return t*t*(3-2*t);}
  function easeOut(v){return 1-Math.pow(1-clamp(v),3);}
  function hash2(x,y){let n=Math.imul(x+17,374761393)+Math.imul(y+31,668265263);n=(n^(n>>>13))*1274126177;return((n^(n>>>16))>>>0)/4294967295;}
  function mulberry32(seed){return function(){let t=seed+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;};}

  const seeded=mulberry32(0x4a6f7921);
  const pencilPasses=Array.from({length:6},(_,i)=>{
    const dir=i%2===0?1:-1;
    const y=(i+.5)*MH/6+(seeded()-.5)*6;
    return{
      dir,y,
      bend:(seeded()-.5)*12,
      wobble:(seeded()-.5)*8,
      width:MH/5.25*(.9+seeded()*.16),
      bristles:Array.from({length:10},()=>({offset:(seeded()-.5),width:.45+seeded()*2,alpha:.08+seeded()*.18,drift:(seeded()-.5)*6}))
    };

  const bloomSeed=mulberry32(0x7f4a7c15);
  const watercolorBlooms=Array.from({length:11},(_,i)=>{

    return{
      x:clamp(MW*(.14+.72*t)+(bloomSeed()-.5)*30,14,MW-14),
      y:clamp(MH*(.08+.84*t)+(bloomSeed()-.5)*34,14,MH-14),
      radius:35+bloomSeed()*28,
      start:i*.078,
      lobes:Array.from({length:4},()=>({angle:bloomSeed()*Math.PI*2,distance:bloomSeed()*.36,scale:.45+bloomSeed()*.48})),

  function samplePaper(data){
    let r=0,g=0,b=0,n=0;
    for(let y=4;y<H*.35;y+=4){
      for(let x=4;x<W-4;x+=4){
        const i=(y*W+x)*4,rr=data[i],gg=data[i+1],bb=data[i+2],lum=(rr+gg+bb)/3;
        if(lum>205&&Math.max(rr,gg,bb)-Math.min(rr,gg,bb)<58){r+=rr;g+=gg;b+=bb;n++;}
      }
    }
    return n?{r:Math.round(r/n),g:Math.round(g/n),b:Math.round(b/n)}:{r:248,g:239,b:216};
  }

  function prepareLayers(){
    targetCtx.drawImage(image,0,0,W,H);
    const src=targetCtx.getImageData(0,0,W,H);
    paperRgb=samplePaper(src.data);
    paperCtx.fillStyle=`rgb(${paperRgb.r},${paperRgb.g},${paperRgb.b})`;
    paperCtx.fillRect(0,0,W,H);
    const paperNoise=paperCtx.createImageData(W,H);
    const paperRnd=mulberry32(0x1a2b3c4d);
    for(let i=0;i<paperNoise.data.length;i+=4){paperNoise.data[i]=82;paperNoise.data[i+1]=68;paperNoise.data[i+2]=44;paperNoise.data[i+3]=Math.floor(paperRnd()*6);}
    paperCtx.putImageData(paperNoise,0,0);

    const out=graphiteCtx.createImageData(W,H);
    const luma=new Float32Array(W*H);
    for(let i=0,p=0;i<src.data.length;i+=4,p++)luma[p]=src.data[i]*.299+src.data[i+1]*.587+src.data[i+2]*.114;
    const graphiteRnd=mulberry32(0x5f3759df);
    for(let y=1;y<H-1;y++){
      for(let x=1;x<W-1;x++){
        const p=y*W+x;
        const gx=-luma[p-W-1]-2*luma[p-1]-luma[p+W-1]+luma[p-W+1]+2*luma[p+1]+luma[p+W+1];
        const gy=-luma[p-W-1]-2*luma[p-W]-luma[p-W+1]+luma[p+W-1]+2*luma[p+W]+luma[p+W+1];
        const edge=clamp((Math.hypot(gx,gy)-12)/125);
        const shade=clamp((220-luma[p])/190)*.10;
        const texture=(graphiteRnd()-.5)*.10;
        const a=clamp(edge*.84+shade+texture)*230;
        const i=p*4;out.data[i]=48;out.data[i+1]=43;out.data[i+2]=36;out.data[i+3]=Math.round(a);
      }
    }
    graphiteCtx.putImageData(out,0,0);
    buildActivationMaps();
    buildStrokePasses(out.data);
  }

  function buildActivationMaps(){
    for(let y=0;y<MH;y++){
      const rowWave=Math.sin(y*.115)*.018+Math.sin(y*.031+1.4)*.013;
      for(let x=0;x<MW;x++){
        const i=y*MW+x;
        const block=hash2(Math.floor(x/7),Math.floor(y/6));
        const grain=hash2(x,y);
        const left=x/(MW-1);
        const diagonal=(left+y/(MH-1))*.5;
        leftGraphActivation[i]=clamp(left*.83+rowWave+(block-.5)*.06+(grain-.5)*.018);
        leftColorActivation[i]=clamp(left*.82+.13+rowWave*.65+(block-.5)*.075+(grain-.5)*.035);
        diagonalGraphActivation[i]=clamp(diagonal*.84+rowWave+(block-.5)*.06+(grain-.5)*.018);
        diagonalColorActivation[i]=clamp(diagonal*.82+.13+rowWave*.65+(block-.5)*.075+(grain-.5)*.035);
      }
    }
  }

  function buildStrokePasses(edgeData){
    const cols=6,rows=8,cellW=MW/cols,cellH=MH/rows,rnd=mulberry32(0x35c9a84f);
    strokePasses=[];
    for(let row=0;row<rows;row++){
      for(let col=0;col<cols;col++){
        const x0=col*cellW,y0=row*cellH;
        let density=0,samples=0;
        for(let my=Math.floor(y0+2);my<Math.floor(y0+cellH-2);my+=3){
          for(let mx=Math.floor(x0+2);mx<Math.floor(x0+cellW-2);mx+=3){
            const sx=Math.min(W-1,Math.floor(mx/MW*W)),sy=Math.min(H-1,Math.floor(my/MH*H));
            density+=edgeData[(sy*W+sx)*4+3];samples++;
          }
        }
        const horizontal=(row+col)%3!==0;
        const start=horizontal?{x:x0-3,y:y0+cellH*(.3+rnd()*.4)}:{x:x0+cellW*(.3+rnd()*.4),y:y0-2};
        const end=horizontal?{x:x0+cellW+3,y:y0+cellH*(.3+rnd()*.4)}:{x:x0+cellW*(.3+rnd()*.4),y:y0+cellH+2};
        strokePasses.push({start,end,cx:(start.x+end.x)/2+(rnd()-.5)*cellW*.3,cy:(start.y+end.y)/2+(rnd()-.5)*cellH*.3,width:cellH*(.78+rnd()*.38),score:(samples?density/samples:0)+rnd()*18});
      }
    }
    strokePasses.sort((a,b)=>b.score-a.score);
  }

  function pointOnQuadratic(a,c,b,t){const mt=1-t;return{x:mt*mt*a.x+2*mt*t*c.x+t*t*b.x,y:mt*mt*a.y+2*mt*t*c.y+t*t*b.y};}
  function drawQuadraticPartial(c,a,control,b,fraction){
    if(fraction<=0)return;
    c.beginPath();c.moveTo(a.x,a.y);
    const steps=Math.max(2,Math.ceil(18*fraction));
    for(let i=1;i<=steps;i++){const p=pointOnQuadratic(a,control,b,fraction*i/steps);c.lineTo(p.x,p.y);}
    c.stroke();
  }

  function pencilPoint(pass){
    const from=pass.dir>0?-MW*.18:MW*1.18,to=pass.dir>0?MW*1.18:-MW*.18;
    return{a:{x:from,y:pass.y},b:{x:to,y:pass.y+pass.wobble},c:{x:MW*.5,y:pass.y+pass.bend}};
  }
  function drawPencilMask(c,p,lead=false){
    c.clearRect(0,0,MW,MH);
    const scaled=clamp(p)*pencilPasses.length;
    pencilPasses.forEach((pass,index)=>{
      const local=clamp(scaled-index);if(local<=0)return;

    });

  }

  function addWatercolorSpot(c,x,y,r,alpha){
    if(r<=1||alpha<=0)return;
    const g=c.createRadialGradient(x,y,r*.12,x,y,r);
    g.addColorStop(0,`rgba(255,255,255,${alpha})`);g.addColorStop(.62,`rgba(255,255,255,${alpha*.88})`);g.addColorStop(.86,`rgba(255,255,255,${alpha*.38})`);g.addColorStop(1,'rgba(255,255,255,0)');
    c.fillStyle=g;c.fillRect(x-r,y-r,r*2,r*2);
  }
  function drawWatercolorMask(c,p,lead=false){
    c.clearRect(0,0,MW,MH);

      const local=easeOut((p-bloom.start)/(lead?.30:.36));if(local<=0)return;

    });
    if(p>=.995){c.fillStyle='#fff';c.fillRect(0,0,MW,MH);}
  }

  function drawStrokeMask(c,p,lead=false){
    c.clearRect(0,0,MW,MH);
    const scaled=clamp(p)*strokePasses.length;
    strokePasses.forEach((stroke,index)=>{
      const local=clamp(scaled-index);if(local<=0)return;
      c.save();c.lineCap='round';c.lineJoin='round';c.strokeStyle=lead?'rgba(255,255,255,.72)':'rgba(255,255,255,.82)';c.lineWidth=stroke.width*(lead?.34:1);
      drawQuadraticPartial(c,stroke.start,{x:stroke.cx,y:stroke.cy},stroke.end,local);
      if(!lead){c.strokeStyle='rgba(255,255,255,.18)';c.lineWidth=stroke.width*.68;drawQuadraticPartial(c,{x:stroke.start.x,y:stroke.start.y-1.5},{x:stroke.cx+1,y:stroke.cy+2},{x:stroke.end.x,y:stroke.end.y-1},local);}
      c.restore();
    });
    if(p>=.995){c.fillStyle='#fff';c.fillRect(0,0,MW,MH);}
  }

  function drawActivationMask(c,activation,p,softness){
    const imageData=c.createImageData(MW,MH),d=imageData.data;
    for(let i=0;i<activation.length;i++){
      let alpha=smoothstep(activation[i]-softness,activation[i]+softness,p);
      if(alpha>0&&alpha<1){const y=Math.floor(i/MW),x=i-y*MW;alpha*=.68+hash2(x+43,y+71)*.32;}
      const j=i*4;d[j]=255;d[j+1]=255;d[j+2]=255;d[j+3]=Math.round(alpha*255);
    }
    if(p>=.995)for(let i=3;i<d.length;i+=4)d[i]=255;
    c.putImageData(imageData,0,0);
  }

  function composeTo(destCtx,layer,mask,alpha=1){
    scratchCtx.clearRect(0,0,W,H);scratchCtx.globalCompositeOperation='source-over';scratchCtx.globalAlpha=alpha;scratchCtx.drawImage(layer,0,0);
    scratchCtx.globalCompositeOperation='destination-in';scratchCtx.globalAlpha=1;scratchCtx.imageSmoothingEnabled=true;scratchCtx.drawImage(mask,0,0,W,H);
    scratchCtx.globalCompositeOperation='source-over';destCtx.drawImage(scratchCanvas,0,0);
  }

  function renderEffect(effect){
    const c=effect.ctx;c.clearRect(0,0,W,H);c.drawImage(paperCanvas,0,0);
    if(effect.name==='pencil'){
      drawPencilMask(maskACtx,clamp(progress/.58),true);
      drawPencilMask(maskBCtx,clamp((progress-.28)/.72),false);
    }else if(effect.name==='ink'){
      drawWatercolorMask(maskACtx,clamp(progress/.66),true);
      drawWatercolorMask(maskBCtx,clamp((progress-.18)/.82),false);
    }else if(effect.name==='stroke'){
      drawStrokeMask(maskACtx,clamp(progress/.56),true);
      drawStrokeMask(maskBCtx,clamp((progress-.24)/.76),false);
    }else if(effect.name==='left'){
      drawActivationMask(maskACtx,leftGraphActivation,clamp(progress/.86),.026);
      drawActivationMask(maskBCtx,leftColorActivation,progress,.055);
    }else{
      drawActivationMask(maskACtx,diagonalGraphActivation,clamp(progress/.86),.026);
      drawActivationMask(maskBCtx,diagonalColorActivation,progress,.055);
    }
    composeTo(c,graphiteCanvas,maskA,.98);
    composeTo(c,targetCanvas,maskB,1);
  }

  function renderAll(){
    if(!ready)return;
    effects.forEach(renderEffect);
    progressInput.value=String(Math.round(progress*1000));
    progressValue.textContent=`${Math.round(progress*100)}%`;
  }
  function syncPlayButton(){
    const iconName=playing?'pause':'play',label=playing?'暂停':(progress>=1?'再次播放':'播放');
    playButton.innerHTML=`<i data-lucide="${iconName}" aria-hidden="true"></i><span>${label}</span>`;
    if(window.lucide)window.lucide.createIcons({attrs:{width:16,height:16}});
  }
  function animate(now){
    if(!playing){raf=0;return;}
    if(!lastFrame)lastFrame=now;
    const delta=now-lastFrame;lastFrame=now;
    progress=clamp(progress+delta*(Number(speedSelect.value)||1)/DURATION);
    if(now-lastRenderTime>=45||progress>=1){renderAll();lastRenderTime=now;}
    if(progress>=1){playing=false;syncPlayButton();raf=0;return;}
    raf=requestAnimationFrame(animate);
  }
  function startPlayback(reset=false){
    if(reduceMotion){progress=1;playing=false;renderAll();syncPlayButton();return;}
    if(reset||progress>=1)progress=0;
    playing=true;lastFrame=0;lastRenderTime=0;syncPlayButton();
    if(!raf)raf=requestAnimationFrame(animate);
  }
  playButton.addEventListener('click',()=>{if(playing){playing=false;if(raf)cancelAnimationFrame(raf);raf=0;syncPlayButton();}else startPlayback(progress>=1);});
  replayButton.addEventListener('click',()=>startPlayback(true));
  progressInput.addEventListener('input',()=>{playing=false;if(raf)cancelAnimationFrame(raf);raf=0;progress=Number(progressInput.value)/1000;renderAll();syncPlayButton();});
  speedSelect.addEventListener('change',()=>{lastFrame=0;});

  const image=new Image();
  image.onload=()=>{prepareLayers();ready=true;renderAll();syncPlayButton();if(playing)raf=requestAnimationFrame(animate);};
  image.onerror=()=>{playing=false;syncPlayButton();};
  image.src=IMAGE_SRC;
})();
</script>
