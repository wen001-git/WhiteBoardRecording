<div id="brush-reveal-lab">
  <div class="viz-controls brush-mode-controls" role="group" aria-label="选择笔迹效果">
    <button type="button" class="btn is-selected" data-mode="pencil" aria-pressed="true">彩铅铺色</button>
    <button type="button" class="btn" data-mode="ink" aria-pressed="false">水墨晕染</button>
    <button type="button" class="btn" data-mode="stroke" aria-pressed="false">逐笔描绘</button>
  </div>

  <div class="brush-stage">
    <canvas id="brush-reveal-canvas" class="card" width="520" height="924" role="img" aria-label="彩铅铺色动态效果预览"></canvas>
  </div>

  <div class="viz-row brush-description" aria-live="polite">
    <span class="viz-badge" id="brush-mode-name">彩铅铺色</span>
    <span class="text-small" id="brush-mode-note">铅笔轮廓先行，宽窄不一的排线往返铺开颜色</span>
  </div>

  <div class="viz-controls brush-playback-controls">
    <button type="button" class="btn btn-primary" id="brush-play-toggle"><i data-lucide="pause" aria-hidden="true"></i><span>暂停</span></button>
    <button type="button" class="btn" id="brush-replay"><i data-lucide="rotate-ccw" aria-hidden="true"></i><span>重播</span></button>
    <label class="form-label brush-progress-label" for="brush-progress">进度 <span id="brush-progress-value">0%</span>
      <input class="form-range" id="brush-progress" type="range" min="0" max="1000" value="0" step="1">
    </label>
    <label class="form-label" for="brush-speed">速度
      <select class="form-select" id="brush-speed">
        <option value="0.75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
      </select>
    </label>
  </div>
  <p class="text-small text-muted brush-source-note">示意素材取自当前中间帧；Demo 已弱化旧遮罩，重点比较笔触边缘与运动节奏。逐笔描绘为位图近似。</p>
</div>

<style>
  #brush-reveal-lab{
    width:100%;
    display:grid;
    gap:16px;
    justify-items:stretch;
  }
  #brush-reveal-lab .brush-mode-controls,
  #brush-reveal-lab .brush-playback-controls,
  #brush-reveal-lab .brush-description{
    justify-content:center;
  }
  #brush-reveal-lab .brush-stage{
    width:100%;
    display:grid;
    place-items:center;
  }
  #brush-reveal-lab canvas{
    display:block;
    width:min(100%,430px);
    height:auto;
  }
  #brush-reveal-lab .brush-description{
    min-height:28px;
    text-align:center;
  }
  #brush-reveal-lab .brush-progress-label{
    flex:1 1 260px;
    max-width:430px;
  }
  #brush-reveal-lab .brush-progress-label .form-range{
    width:100%;
  }
  #brush-reveal-lab .brush-source-note{
    margin:0;
    text-align:center;
  }
  @media (max-width:480px){
    #brush-reveal-lab{gap:12px;}
    #brush-reveal-lab .brush-mode-controls .btn{flex:1 1 30%;}
    #brush-reveal-lab .brush-playback-controls{align-items:flex-end;}
    #brush-reveal-lab .brush-progress-label{order:3;flex-basis:100%;max-width:none;}
  }
</style>

  function clamp(v, min=0, max=1){ return Math.max(min, Math.min(max, v)); }
  function smoothstep(a,b,v){
    const t=clamp((v-a)/(b-a));
    return t*t*(3-2*t);
  }
  function easeOut(v){ return 1-Math.pow(1-clamp(v),3); }
  function mix(a,b,t){ return a+(b-a)*t; }
  function mulberry32(seed){
    return function(){
      let t=seed+=0x6D2B79F5;
      t=Math.imul(t^t>>>15,t|1);
      t^=t+Math.imul(t^t>>>7,t|61);
      return ((t^t>>>14)>>>0)/4294967296;
    };
  }

  const seeded = mulberry32(0x4a6f7921);
  const pencilPasses = Array.from({length:7}, (_,i) => {

  function samplePaperColor(data){
    let r=0,g=0,b=0,n=0;
    for(let y=8;y<H*.28;y+=5){
      for(let x=8;x<W-8;x+=5){
        const i=(y*W+x)*4;
        const rr=data[i], gg=data[i+1], bb=data[i+2];
        const max=Math.max(rr,gg,bb), min=Math.min(rr,gg,bb);
        const lum=(rr+gg+bb)/3;
        if(lum>205 && max-min<48){ r+=rr;g+=gg;b+=bb;n++; }
      }
    }
    if(n) return {r:Math.round(r/n),g:Math.round(g/n),b:Math.round(b/n)};
    return {r:248,g:239,b:216};
  }

  function prepareTarget(){
    const sctx=sourceCanvas.getContext('2d');
    sctx.drawImage(image,0,0,W,H);
    targetCtx.drawImage(sourceCanvas,0,0);
    const imageData=targetCtx.getImageData(0,0,W,H);
    const d=imageData.data;
    paperRgb=samplePaperColor(d);

    for(let y=0;y<H;y++){
      for(let x=0;x<W;x++){
        const i=(y*W+x)*4;
        const oldR=d[i], oldG=d[i+1], oldB=d[i+2];
        const line=x+1.137*y-693;
        const restore=smoothstep(-52,132,line);
        if(restore<=0) continue;
        const lum=(oldR*.299+oldG*.587+oldB*.114)/255;
        const detail=.44+.46*lum;
        const u=x/W, v=y/H;
        const jade=Math.exp(-((u-.73)**2/.12+(v-.38)**2/.13));
        const gold=Math.exp(-((u-.42)**2/.18+(v-.58)**2/.16));
        const azure=Math.exp(-((u-.58)**2/.25+(v-.82)**2/.10));
        const washTotal=jade+gold+azure+.0001;
        const washR=(92*jade+184*gold+80*azure)/washTotal;
        const washG=(125*jade+145*gold+112*azure)/washTotal;
        const washB=(78*jade+72*gold+128*azure)/washTotal;
        const baseR=mix(paperRgb.r,oldR,detail);
        const baseG=mix(paperRgb.g,oldG,detail);
        const baseB=mix(paperRgb.b,oldB,detail);
        const wash=.12*(1-lum)*clamp(washTotal,0,1);
        const rebuiltR=mix(baseR,washR,wash);
        const rebuiltG=mix(baseG,washG,wash);
        const rebuiltB=mix(baseB,washB,wash);
        d[i]=Math.round(mix(oldR,rebuiltR,restore));
        d[i+1]=Math.round(mix(oldG,rebuiltG,restore));
        d[i+2]=Math.round(mix(oldB,rebuiltB,restore));
      }
    }
    targetCtx.putImageData(imageData,0,0);
    buildInkLayer();
    buildPaperLayer();
    buildStrokePasses();
  }

  function buildInkLayer(){
    const src=targetCtx.getImageData(0,0,W,H);
    const out=inkCtx.createImageData(W,H);
    const luma=new Float32Array(W*H);
    for(let i=0,p=0;i<src.data.length;i+=4,p++){
      luma[p]=src.data[i]*.299+src.data[i+1]*.587+src.data[i+2]*.114;
    }
    for(let y=1;y<H-1;y++){
      for(let x=1;x<W-1;x++){
        const p=y*W+x;
        const gx=-luma[p-W-1]-2*luma[p-1]-luma[p+W-1]+luma[p-W+1]+2*luma[p+1]+luma[p+W+1];
        const gy=-luma[p-W-1]-2*luma[p-W]-luma[p-W+1]+luma[p+W-1]+2*luma[p+W]+luma[p+W+1];
        const edge=clamp((Math.hypot(gx,gy)-16)/150);
        const shade=clamp((218-luma[p])/190)*.13;
        const alpha=clamp(edge*.74+shade)*225;
        const i=p*4;
        out.data[i]=52;
        out.data[i+1]=45;
        out.data[i+2]=36;
        out.data[i+3]=Math.round(alpha);
      }
    }
    inkCtx.putImageData(out,0,0);
  }

  function buildPaperLayer(){
    paperCtx.fillStyle=`rgb(${paperRgb.r},${paperRgb.g},${paperRgb.b})`;
    paperCtx.fillRect(0,0,W,H);
    const noise=paperCtx.createImageData(W,H);
    const rnd=mulberry32(0x1a2b3c4d);
    for(let i=0;i<noise.data.length;i+=4){
      const a=Math.floor(rnd()*8);
      noise.data[i]=82;
      noise.data[i+1]=68;
      noise.data[i+2]=44;
      noise.data[i+3]=a;
    }
    paperCtx.putImageData(noise,0,0);
  }

  function buildStrokePasses(){
    const edge=inkCtx.getImageData(0,0,W,H).data;
    const cols=7, rows=11, cellW=W/cols, cellH=H/rows;
    const rnd=mulberry32(0x35c9a84f);
    strokePasses=[];
    for(let row=0;row<rows;row++){
      for(let col=0;col<cols;col++){
        const x0=col*cellW, y0=row*cellH;
        let density=0, samples=0;
        for(let y=Math.floor(y0+8);y<Math.min(H,Math.floor(y0+cellH-8));y+=8){
          for(let x=Math.floor(x0+8);x<Math.min(W,Math.floor(x0+cellW-8));x+=8){
            density+=edge[(y*W+x)*4+3]; samples++;
          }
        }
        const horizontal=(row+col)%3!==0;
        const margin=cellW*.12;

          ? {x:x0-margin,y:y0+cellH*(.28+rnd()*.44)}
          : {x:x0+cellW*(.25+rnd()*.5),y:y0-cellH*.1};

          ? {x:x0+cellW+margin,y:y0+cellH*(.28+rnd()*.44)}
          : {x:x0+cellW*(.25+rnd()*.5),y:y0+cellH*1.1};
        strokePasses.push({
          start,end,
          cx:(start.x+end.x)/2+(rnd()-.5)*cellW*.32,
          cy:(start.y+end.y)/2+(rnd()-.5)*cellH*.28,
          width:cellH*(.78+rnd()*.38),
          score:(samples?density/samples:0)+rnd()*18-row*.18
        });
      }
    }
    strokePasses.sort((a,b)=>b.score-a.score);
  }

  function pointOnQuadratic(a,c,b,t){
    const mt=1-t;
    return {
      x:mt*mt*a.x+2*mt*t*c.x+t*t*b.x,
      y:mt*mt*a.y+2*mt*t*c.y+t*t*b.y
    };
  }

  function drawQuadraticPartial(c,a,control,b,fraction){
    if(fraction<=0) return;
    c.beginPath();
    c.moveTo(a.x,a.y);
    const steps=Math.max(2,Math.ceil(24*fraction));
    for(let i=1;i<=steps;i++){
      const p=pointOnQuadratic(a,control,b,fraction*i/steps);
      c.lineTo(p.x,p.y);
    }
    c.stroke();
  }

  function pencilPoint(pass,t){
    const from=pass.dir>0?-W*.16:W*1.16;
    const to=pass.dir>0?W*1.16:-W*.16;
    const a={x:from,y:pass.y};
    const b={x:to,y:pass.y+pass.wobble};
    const c={x:W*.5,y:pass.y+pass.bend};
    return {a,b,c,p:pointOnQuadratic(a,c,b,t)};
  }

  function drawPencilMask(c,p,lead=false){
    c.clearRect(0,0,W,H);
    const scaled=clamp(p)*pencilPasses.length;
    pencilPasses.forEach((pass,index)=>{
      const local=clamp(scaled-index);
      if(local<=0) return;
      const path=pencilPoint(pass,local);
      c.save();
      c.lineCap='round';
      c.lineJoin='round';
      c.strokeStyle='rgba(255,255,255,.78)';
      c.lineWidth=pass.width*(lead?.74:1);
      drawQuadraticPartial(c,path.a,path.c,path.b,local);
      c.strokeStyle='rgba(255,255,255,.22)';
      c.lineWidth=pass.width*(lead?.58:.84);
      drawQuadraticPartial(c,{x:path.a.x,y:path.a.y-8},{x:path.c.x,y:path.c.y+5},{x:path.b.x,y:path.b.y-5},local);
      pass.bristles.forEach(bristle=>{
        c.strokeStyle=`rgba(255,255,255,${bristle.alpha})`;
        c.lineWidth=bristle.width*(lead?.75:1);
        const off=bristle.offset*pass.width*.48;
        drawQuadraticPartial(c,
          {x:path.a.x,y:path.a.y+off},
          {x:path.c.x,y:path.c.y+off+bristle.drift},
          {x:path.b.x,y:path.b.y+off-bristle.drift*.3},
          local
        );
      });
      c.restore();
    });
    if(p>=.995){ c.fillStyle='#fff'; c.fillRect(0,0,W,H); }
  }

  function addWatercolorSpot(c,x,y,r,alpha){
    if(r<=1 || alpha<=0) return;
    const gradient=c.createRadialGradient(x,y,r*.12,x,y,r);
    gradient.addColorStop(0,`rgba(255,255,255,${alpha})`);
    gradient.addColorStop(.62,`rgba(255,255,255,${alpha*.88})`);
    gradient.addColorStop(.86,`rgba(255,255,255,${alpha*.38})`);
    gradient.addColorStop(1,'rgba(255,255,255,0)');
    c.fillStyle=gradient;
    c.fillRect(x-r,y-r,r*2,r*2);
  }

  function drawWatercolorMask(c,p,lead=false){
    c.clearRect(0,0,W,H);
    watercolorBlooms.forEach(bloom=>{
      const local=easeOut((p-bloom.start)/(lead?.28:.34));
      if(local<=0) return;
      const radius=bloom.radius*local*(lead?.82:1);
      addWatercolorSpot(c,bloom.x,bloom.y,radius,.92);
      bloom.lobes.forEach(lobe=>{
        const distance=radius*lobe.distance;
        addWatercolorSpot(c,
          bloom.x+Math.cos(lobe.angle)*distance,
          bloom.y+Math.sin(lobe.angle)*distance,
          radius*lobe.scale,
          .42
        );
      });
      bloom.drops.forEach(drop=>{
        const distance=radius*drop.distance;
        addWatercolorSpot(c,
          bloom.x+Math.cos(drop.angle)*distance,
          bloom.y+Math.sin(drop.angle)*distance,
          bloom.radius*drop.scale*local,
          .48
        );
      });
    });
    if(p>=.995){ c.fillStyle='#fff'; c.fillRect(0,0,W,H); }
  }

  function drawStrokeMask(c,p,lead=false){
    c.clearRect(0,0,W,H);
    const scaled=clamp(p)*strokePasses.length;
    strokePasses.forEach((stroke,index)=>{
      const local=clamp(scaled-index);
      if(local<=0) return;
      c.save();
      c.lineCap='round';
      c.lineJoin='round';
      c.strokeStyle=lead?'rgba(255,255,255,.72)':'rgba(255,255,255,.82)';
      c.lineWidth=stroke.width*(lead?.34:1);
      drawQuadraticPartial(c,stroke.start,{x:stroke.cx,y:stroke.cy},stroke.end,local);
      if(!lead){
        c.strokeStyle='rgba(255,255,255,.18)';
        c.lineWidth=stroke.width*.68;
        drawQuadraticPartial(c,
          {x:stroke.start.x,y:stroke.start.y-5},
          {x:stroke.cx+4,y:stroke.cy+7},
          {x:stroke.end.x,y:stroke.end.y-4},
          local
        );
      }
      c.restore();
    });
    if(p>=.995){ c.fillStyle='#fff'; c.fillRect(0,0,W,H); }
  }

  function compose(layer,mask,alpha=1){
    compositeCtx.clearRect(0,0,W,H);
    compositeCtx.globalCompositeOperation='source-over';
    compositeCtx.globalAlpha=alpha;
    compositeCtx.drawImage(layer,0,0);
    compositeCtx.globalCompositeOperation='destination-in';
    compositeCtx.globalAlpha=1;
    compositeCtx.drawImage(mask,0,0);
    compositeCtx.globalCompositeOperation='source-over';
    ctx.drawImage(compositeCanvas,0,0);
  }

  function render(){
    if(!ready) return;
    ctx.clearRect(0,0,W,H);
    ctx.drawImage(paperCanvas,0,0);
    const inkProgress=clamp(progress/.58);
    const colorProgress=clamp((progress-.28)/.72);
    if(mode==='pencil'){
      drawPencilMask(inkMaskCtx,inkProgress,true);
      drawPencilMask(colorMaskCtx,colorProgress,false);
    }else if(mode==='ink'){
      drawWatercolorMask(inkMaskCtx,clamp(progress/.66),true);
      drawWatercolorMask(colorMaskCtx,clamp((progress-.18)/.82),false);
    }else{
      drawStrokeMask(inkMaskCtx,clamp(progress/.56),true);
      drawStrokeMask(colorMaskCtx,clamp((progress-.24)/.76),false);
    }
    compose(inkCanvas,inkMask,.96);
    compose(targetCanvas,colorMask,1);
    progressInput.value=String(Math.round(progress*1000));
    progressValue.textContent=`${Math.round(progress*100)}%`;
  }

  function syncPlayButton(){
    const iconName=playing?'pause':'play';
    const label=playing?'暂停':(progress>=1?'再次播放':'播放');
    playToggle.innerHTML=`<i data-lucide="${iconName}" aria-hidden="true"></i><span>${label}</span>`;
    if(window.lucide) window.lucide.createIcons({attrs:{width:16,height:16}});
  }

  function animate(now){
    if(!playing){ raf=0; return; }
    if(!lastFrame) lastFrame=now;
    const speed=Number(speedSelect.value)||1;
    progress=clamp(progress+(now-lastFrame)*speed/DURATION);
    lastFrame=now;
    render();
    if(progress>=1){
      playing=false;
      syncPlayButton();
      raf=0;
      return;
    }
    raf=requestAnimationFrame(animate);
  }

  function startPlayback(reset=false){
    if(reduceMotion){
      progress=1;
      playing=false;
      render();
      syncPlayButton();
      return;
    }
    if(reset || progress>=1) progress=0;
    playing=true;
    lastFrame=0;
    syncPlayButton();
    if(!raf) raf=requestAnimationFrame(animate);
  }

  modeButtons.forEach(button=>{
    button.addEventListener('click',()=>{
      mode=button.dataset.mode;
      modeButtons.forEach(item=>{
        const selected=item===button;
        item.classList.toggle('is-selected',selected);
        item.setAttribute('aria-pressed',String(selected));
      });
      modeName.textContent=modes[mode].name;
      modeNote.textContent=modes[mode].note;
      canvas.setAttribute('aria-label',modes[mode].aria);
      startPlayback(true);
    });
  });

  playToggle.addEventListener('click',()=>{
    if(playing){
      playing=false;
      if(raf) cancelAnimationFrame(raf);
      raf=0;
      syncPlayButton();
    }else{
      startPlayback(progress>=1);
    }
  });
  replayButton.addEventListener('click',()=>startPlayback(true));
  progressInput.addEventListener('input',()=>{
    playing=false;
    if(raf) cancelAnimationFrame(raf);
    raf=0;
    progress=Number(progressInput.value)/1000;
    render();
    syncPlayButton();
  });
  speedSelect.addEventListener('change',()=>{ lastFrame=0; });

  const image=new Image();
  image.onload=()=>{
    prepareTarget();
    ready=true;
    render();
    syncPlayButton();
    if(playing) raf=requestAnimationFrame(animate);
  };
  image.onerror=()=>{
    paperCtx.fillStyle='rgb(245,238,222)';
    paperCtx.fillRect(0,0,W,H);
    ctx.drawImage(paperCanvas,0,0);
    playing=false;
    syncPlayButton();
  };
  image.src=IMAGE_SRC;
})();
</script>
